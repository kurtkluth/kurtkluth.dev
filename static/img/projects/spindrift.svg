<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Spindrift artwork">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#1d2735" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0a0e14"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <ellipse cx="400" cy="130" rx="420" ry="230" fill="url(#glow)"/>
  <!-- setting sun -->
  <circle cx="400" cy="170" r="52" fill="none" stroke="#f59e0b" stroke-width="5"/>
  <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M400 92v-22"/>
    <path d="M330 120l-16-16"/>
    <path d="M470 120l16-16"/>
  </g>
  <!-- waves -->
  <g fill="none" stroke-linecap="round">
    <path d="M160 250c40-24 80-24 120 0s80 24 120 0 80-24 120 0 80 24 120 0" stroke="#f59e0b" stroke-width="5"/>
    <path d="M190 292c40-24 80-24 120 0s80 24 120 0 80-24 120 0" stroke="#fbbf24" stroke-width="4" opacity="0.6"/>
    <path d="M230 330c40-20 70-20 110 0s70 20 110 0" stroke="#fde68a" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- spray dots -->
  <g fill="#fde68a" opacity="0.8">
    <circle cx="300" cy="228" r="4"/>
    <circle cx="510" cy="230" r="4"/>
    <circle cx="420" cy="270" r="3"/>
  </g>
  <text x="400" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="40" font-weight="600" fill="#e6edf3" letter-spacing="5">SPINDRIFT</text>
  <text x="400" y="424" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#8b98a9" letter-spacing="3">KLUTH STUDIOS</text>
</svg>
