<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="SQLCLR artwork">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#1d2735" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0a0e14"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <ellipse cx="400" cy="120" rx="420" ry="220" fill="url(#glow)"/>
  <!-- database cylinder -->
  <g stroke="#22d3ee" stroke-width="5" fill="none">
    <ellipse cx="330" cy="150" rx="110" ry="34"/>
    <path d="M220 150v130c0 18.8 49.2 34 110 34s110-15.2 110-34V150"/>
    <path d="M220 215c0 18.8 49.2 34 110 34s110-15.2 110-34" opacity="0.6"/>
  </g>
  <!-- angle brackets -->
  <g stroke="#67e8f9" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M520 190l-42 42 42 42"/>
    <path d="M580 190l42 42-42 42"/>
  </g>
  <text x="400" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="42" font-weight="600" fill="#e6edf3" letter-spacing="6">SQLCLR</text>
  <text x="400" y="424" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#8b98a9" letter-spacing="3">.NET INSIDE SQL SERVER</text>
</svg>
