<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Lisetris artwork">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#1d2735" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0a0e14"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <ellipse cx="400" cy="130" rx="420" ry="230" fill="url(#glow)"/>
  <!-- falling tetrominoes -->
  <g stroke="#0a0e14" stroke-width="3">
    <!-- T piece -->
    <g fill="#a78bfa">
      <rect x="310" y="90" width="44" height="44" rx="6"/>
      <rect x="354" y="90" width="44" height="44" rx="6"/>
      <rect x="398" y="90" width="44" height="44" rx="6"/>
      <rect x="354" y="134" width="44" height="44" rx="6"/>
    </g>
    <!-- L piece -->
    <g fill="#c4b5fd" opacity="0.85">
      <rect x="490" y="150" width="44" height="44" rx="6"/>
      <rect x="490" y="194" width="44" height="44" rx="6"/>
      <rect x="490" y="238" width="44" height="44" rx="6"/>
      <rect x="534" y="238" width="44" height="44" rx="6"/>
    </g>
    <!-- stack at bottom -->
    <g fill="#7c6bd4" opacity="0.7">
      <rect x="222" y="282" width="44" height="44" rx="6"/>
      <rect x="266" y="282" width="44" height="44" rx="6"/>
      <rect x="266" y="238" width="44" height="44" rx="6"/>
      <rect x="310" y="282" width="44" height="44" rx="6"/>
      <rect x="354" y="282" width="44" height="44" rx="6"/>
    </g>
  </g>
  <text x="400" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="40" font-weight="600" fill="#e6edf3" letter-spacing="5">LISETRIS</text>
  <text x="400" y="424" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#8b98a9" letter-spacing="3">KLUTH STUDIOS</text>
</svg>
