<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Skyroute artwork">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#1d2735" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0a0e14"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <ellipse cx="400" cy="130" rx="420" ry="230" fill="url(#glow)"/>
  <!-- dotted flight route -->
  <path d="M170 300C260 180 380 120 470 170s90 90 160-40" fill="none" stroke="#60a5fa" stroke-width="4" stroke-dasharray="2 14" stroke-linecap="round"/>
  <!-- waypoints -->
  <g fill="none" stroke="#93c5fd" stroke-width="3">
    <circle cx="170" cy="300" r="10"/>
    <circle cx="470" cy="170" r="10"/>
  </g>
  <!-- paper plane -->
  <g transform="translate(630 130) rotate(24)">
    <path d="M0 0l64 22-64 22 14-22z" fill="#60a5fa"/>
    <path d="M0 0l14 22-4 26z" fill="#3b82f6"/>
  </g>
  <!-- clouds -->
  <g fill="#1d2735">
    <ellipse cx="250" cy="120" rx="46" ry="14"/>
    <ellipse cx="590" cy="280" rx="56" ry="16"/>
  </g>
  <text x="400" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="40" font-weight="600" fill="#e6edf3" letter-spacing="5">SKYROUTE</text>
  <text x="400" y="424" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#8b98a9" letter-spacing="3">KLUTH STUDIOS</text>
</svg>
